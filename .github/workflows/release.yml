name: Release

# Builds a store-ready .iq and side-loadable .prg files, then publishes them to a
# GitHub Release whenever you push a version tag, e.g.:
#
#     git tag v1.0.0
#     git push origin v1.0.0
#
# ── One-time setup ────────────────────────────────────────────────────────────
# Repository secret  GARMIN_DEVELOPER_KEY
#   Settings → Secrets and variables → Actions → Secrets → New repository secret.
#   Base64-encode your developer key and paste the result:
#     Windows : [Convert]::ToBase64String([IO.File]::ReadAllBytes("developer_key.der")) | Set-Clipboard
#     Linux   : base64 -w0 developer_key.der
#
# The Connect IQ SDK itself does NOT need to be installed — the job runs inside a
# container image that already ships it.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/blackshadev/garmin-connectiq-tools:9.1.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode developer key
        run: |
          if [ -z "${{ secrets.GARMIN_DEVELOPER_KEY }}" ]; then
            echo "Error: GARMIN_DEVELOPER_KEY secret is not set!" >&2
            exit 1
          fi
          echo "${{ secrets.GARMIN_DEVELOPER_KEY }}" | base64 -d > developer_key.der

      - name: Build Garmin packages
        run: |
          mkdir -p bin

          echo "Compiling store package (.iq)..."
          java -jar /connectiq/bin/monkeybrains.jar \
            -e \
            -f monkey.jungle \
            -y developer_key.der \
            -o bin/MedMinder.iq

          # A representative set of side-loadable .prg files. The .iq above already
          # covers every product in manifest.xml for the store.
          for device in fenix7 venu3 vivoactive5 fr965 fr255 instinct3amoled45mm epix2; do
            echo "Compiling .prg for $device..."
            java -jar /connectiq/bin/monkeybrains.jar \
              -f monkey.jungle \
              -y developer_key.der \
              -o "bin/MedMinder_${device}.prg" \
              -d "$device"
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MedMinder ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            bin/MedMinder.iq
            bin/MedMinder_*.prg
