<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1440px; height: 720px; overflow: hidden; }
  body {
    font-family: "Segoe UI", "Roboto", system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(1100px 700px at 78% 50%, rgba(90,200,250,0.10), rgba(90,200,250,0) 60%),
      radial-gradient(900px 600px at 80% 60%, rgba(218,55,65,0.16), rgba(218,55,65,0) 62%),
      linear-gradient(160deg, #11151d 0%, #0b0d12 55%, #070809 100%);
    color: #fff;
    position: relative;
  }

  /* center-safe zone padding so store edge-crops don't clip key content */
  .stage {
    position: absolute; inset: 0;
    display: grid; grid-template-columns: 1fr 560px;
    align-items: center;
    padding: 0 96px;
  }

  /* ---- left: copy ---- */
  .copy { max-width: 620px; }
  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 16px; border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.10);
    font-size: 18px; letter-spacing: 0.4px; color: #c8ccd4;
    margin-bottom: 28px;
  }
  .badge .dot { width: 10px; height: 10px; border-radius: 50%; background: #57c788; box-shadow: 0 0 12px #57c788; }

  .wordmark { font-size: 92px; font-weight: 800; letter-spacing: -2px; line-height: 1; }
  .wordmark .med { color: #fff; }
  .wordmark .minder { color: #5ac8fa; }

  .tagline { margin-top: 24px; font-size: 32px; font-weight: 500; color: #e7e9ee; line-height: 1.3; }
  .sub { margin-top: 16px; font-size: 22px; color: #969ca6; line-height: 1.45; max-width: 560px; }

  .chips { margin-top: 40px; display: flex; gap: 14px; }
  .chip {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 12px 20px; border-radius: 14px; font-size: 20px; font-weight: 600;
    background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.09); color: #d7dae0;
  }
  .chip .pip { width: 11px; height: 11px; border-radius: 50%; }

  /* ---- right: watch + pill ---- */
  .device { position: relative; width: 560px; height: 560px; justify-self: center; }

  .watch {
    position: absolute; left: 40px; top: 40px;
    width: 460px; height: 460px; border-radius: 50%;
    background: radial-gradient(circle at 50% 38%, #1a1f29 0%, #0c0e13 78%);
    box-shadow:
      0 0 0 14px #1b1e25,
      0 0 0 18px #2a2f37,
      0 40px 90px rgba(0,0,0,0.6),
      0 0 120px rgba(90,200,250,0.10);
    overflow: hidden;
  }
  .screen { position: absolute; inset: 18px; border-radius: 50%; overflow: hidden;
            background: linear-gradient(180deg, #0c0f15, #090b0f); }
  .ui { position: absolute; inset: 0; padding: 70px 64px 0; }
  .ui .title { text-align: center; font-size: 38px; font-weight: 800; }
  .ui .streak { text-align: center; font-size: 21px; font-weight: 700; color: #57c788; margin-top: 4px; }
  .ui .rule { height: 1px; background: rgba(255,255,255,0.08); margin: 20px 8px 16px; }
  .ui .row { display: flex; align-items: center; gap: 14px; padding: 9px 6px; font-size: 24px; }
  .ui .row .pip { width: 16px; height: 16px; border-radius: 50%; flex: none; }
  .ui .row .name { color: #e9ebef; font-weight: 600; }
  .ui .row.dim .name { color: #aeb3bb; font-weight: 500; }
  .ui .row .time { color: #5ac8fa; font-weight: 700; }

  /* capsule pill — matches the app/store icon */
  .pill {
    position: absolute; right: 18px; bottom: 14px;
    width: 232px; height: 108px; transform: rotate(-32deg);
    filter: drop-shadow(0 24px 40px rgba(0,0,0,0.55));
  }
  .pill svg { display: block; }
</style>
</head>
<body>
  <div class="stage">
    <div class="copy">
      <div class="badge"><span class="dot"></span>Dose tracker &amp; medicine list</div>
      <div class="wordmark"><span class="med">Med</span><span class="minder">Minder</span></div>
      <div class="tagline">Never miss a dose.</div>
      <div class="sub">Track your daily doses, build an adherence streak, and keep a tidy list of your medications — right on your wrist.</div>
      <div class="chips">
        <div class="chip"><span class="pip" style="background:#5ac8fa"></span>Today</div>
        <div class="chip"><span class="pip" style="background:#57c788"></span>Streak</div>
        <div class="chip"><span class="pip" style="background:#da3741"></span>Medicine list</div>
      </div>
    </div>

    <div class="device">
      <div class="watch">
        <div class="screen">
          <div class="ui">
            <div class="title">Today</div>
            <div class="streak">3-day streak</div>
            <div class="rule"></div>
            <div class="row"><span class="pip" style="background:#5ac8fa"></span><span class="time">08:00</span><span class="name">Metformin</span></div>
            <div class="row"><span class="pip" style="background:#57c788"></span><span class="time">13:00</span><span class="name">Aspirin</span></div>
            <div class="row dim"><span class="pip" style="background:#666c76"></span><span class="time" style="color:#7c828c">20:00</span><span class="name">Vitamin D</span></div>
          </div>
        </div>
      </div>

      <div class="pill">
        <svg width="250" height="116" viewBox="0 0 250 116" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ef5560"/>
              <stop offset="1" stop-color="#d4313b"/>
            </linearGradient>
            <linearGradient id="white" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ffffff"/>
              <stop offset="1" stop-color="#e9ecf0"/>
            </linearGradient>
          </defs>
          <!-- red (left) half -->
          <path d="M58 0 H125 V116 H58 A58 58 0 0 1 58 0 Z" fill="url(#red)"/>
          <!-- white (right) half -->
          <path d="M125 0 H192 A58 58 0 0 1 192 116 H125 Z" fill="url(#white)"/>
          <!-- seam -->
          <rect x="121" y="0" width="8" height="116" fill="#0c0e13"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
